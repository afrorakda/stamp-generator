<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stamp Generator</title>
    <link rel="apple-touch-icon" href="image_121.png">
    <link rel="icon" href="image_121.png">
    <style>
        :root {
            --main: #333;
            --bg: #fff;
            --accent: #eee;
            --input-bg: #fafafa;
            --radius: 15px; /* 憲法：全要素 15px角丸 */
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--main);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Header */
        header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* 開発番号 #121 を反映 */
        h1 { font-size: 1.2rem; margin: 0; font-weight: 900; }
        h1 span { font-weight: normal; color: #999; margin-right: 5px; }

        .hub-btn {
            text-decoration: none;
            color: var(--main);
            background: var(--accent);
            padding: 8px 15px;
            border-radius: var(--radius);
            font-size: 0.9rem;
            font-weight: bold;
        }

        /* Main Container */
        main {
            flex: 1;
            padding: 0 20px;
            max-width: 500px;
            margin: 0 auto;
            width: 100%;
        }

        /* Preview Area */
        .preview-container {
            background: #ccc; /* 透過確認用のグレー背景 */
            width: 100%;
            aspect-ratio: 370 / 320; /* LINE規定比率 */
            border-radius: var(--radius);
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            overflow: hidden;
        }

        #previewCanvas {
            max-width: 100%;
            max-height: 100%;
            background: transparent;
        }

        /* Controls */
        .input-group {
            position: relative;
            margin-bottom: 15px;
        }

        /* iOS Safari鉄壁対策含む入力エリア */
        input {
            width: 100%;
            padding: 15px;
            border: 2px solid var(--accent);
            border-radius: var(--radius);
            background: var(--input-bg);
            font-size: 1rem;
            color: var(--main);
            outline: none;
            -webkit-appearance: none;
            opacity: 1 !important;
            -webkit-text-fill-color: var(--main);
        }

        input::placeholder { color: #bbb; }

        .clr {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: var(--accent);
            border: none;
            width: 25px;
            height: 25px;
            border-radius: 50%;
            color: var(--main);
            cursor: pointer;
            display: none;
            font-size: 12px;
            line-height: 1;
        }

        .gen-btn {
            width: 100%;
            padding: 15px;
            background: var(--main);
            color: var(--bg);
            border: none;
            border-radius: var(--radius);
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .gen-btn:active { opacity: 0.8; }

        /* Footer (鉄壁ロジック：JSON成否に関わらず動く) */
        footer {
            padding: 30px 20px;
            text-align: center;
            font-size: 0.8rem;
        }

        .footer-links {
            margin-bottom: 15px;
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .footer-links a {
            color: var(--main);
            text-decoration: none;
            font-weight: bold;
        }

        .copyright { color: #999; }

        /* Modal (15px角丸強制) */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: var(--bg);
            padding: 30px;
            border-radius: var(--radius);
            max-width: 90%;
            text-align: left;
        }
    </style>
</head>
<body>

<header>
    <h1><span>#121</span>Stamp Gen</h1>
    <a href="https://afrorakda.github.io/" class="hub-btn">🏠Hub</a>
</header>

<main>
    <div class="preview-container">
        <canvas id="previewCanvas" width="370" height="320"></canvas>
    </div>

    <div class="input-group">
        <input type="text" id="jaInput" placeholder="承知いたしました" maxlength="15">
        <button class="clr" id="clrJa" onclick="clearInput('jaInput')">×</button>
    </div>

    <div class="input-group">
        <input type="text" id="enInput" placeholder="NOTED" maxlength="30">
        <button class="clr" id="clrEn" onclick="clearInput('enInput')">×</button>
    </div>

    <button class="gen-btn" onclick="downloadStamp()">Download PNG</button>
</main>

<footer>
    <div class="footer-links">
        <a href="https://ko-fi.com/afrorakda" target="_blank">☕️buy me a coffee</a>
        <a href="javascript:void(0)" onclick="openModal()">Privacy Policy</a>
    </div>
    <div class="copyright">No login / No tracking / No ads / Browser only<br>afrorakda © 2026</div>
</footer>

<div id="privacyModal" class="modal" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3>Privacy Policy</h3>
        <p>No login. No tracking. No ads. Browser only.<br>All processing happens locally in your browser.</p>
        <button class="gen-btn" onclick="closeModal()">Close</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('previewCanvas');
    const ctx = canvas.getContext('2d');
    const jaInput = document.getElementById('jaInput');
    const enInput = document.getElementById('enInput');

    // Canvasへの描画ロジック（Fridge Combo UIを完全再現）
    function draw() {
        const jaText = jaInput.value || jaInput.placeholder;
        const enText = (enInput.value || enInput.placeholder).toUpperCase();

        // 完全にクリア（透過状態にする）
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Fridge Comboスタイルのボックスを描画
        const rectW = 330; // 370pxの中に収める
        const rectH = 180;
        const x = (canvas.width - rectW) / 2;
        const y = (canvas.height - rectH) / 2;
        const radius = 15; // 憲法：15px角丸

        ctx.strokeStyle = '#333333'; // メインカラー
        ctx.lineWidth = 8;          // 道具感を出す太めの線
        ctx.fillStyle = '#ffffff';    // ボックス内は白

        ctx.beginPath();
        ctx.moveTo(x + radius, y);
        ctx.lineTo(x + rectW - radius, y);
        ctx.quadraticCurveTo(x + rectW, y, x + rectW, y + radius);
        ctx.lineTo(x + rectW, y + rectH - radius);
        ctx.quadraticCurveTo(x + rectW, y + rectH, x + rectW - radius, y + rectH);
        ctx.lineTo(x + radius, y + rectH);
        ctx.quadraticCurveTo(x, y + rectH, x, y + rectH - radius);
        ctx.lineTo(x, y + radius);
        ctx.quadraticCurveTo(x, y, x + radius, y);
        ctx.closePath();
        
        ctx.fill();   // 白で塗りつぶし
        ctx.stroke(); // #333で枠線

        // テキスト描画（#333）
        ctx.fillStyle = '#333333';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle'; // 上下中央揃えの基準
        
        // 日本語（メイン：極太サンセリフ）
        ctx.font = 'bold 42px sans-serif';
        // ボックスの中央から少し上に配置
        ctx.fillText(jaText, canvas.width / 2, y + (rectH / 2) - 15);

        // 英語（サブ：少し小さく、洒落感を出す）
        ctx.font = '18px sans-serif';
        ctx.letterSpacing = "2px"; // 文字間を広げる
        // ボックスの中央から少し下に配置
        ctx.fillText(enText, canvas.width / 2, y + (rectH / 2) + 25);
    }

    // 透過PNGとしてダウンロード（html2canvas不要、標準API）
    function downloadStamp() {
        const link = document.createElement('a');
        // ファイル名にタイムスタンプを付与
        link.download = `stamp_${Date.now()}.png`;
        link.href = canvas.toDataURL('image/png'); // デフォルトで背景透過
        link.click();
    }

    function clearInput(id) {
        const el = document.getElementById(id);
        el.value = '';
        toggleClr(el);
        draw();
    }

    function toggleClr(el) {
        const btn = el.nextElementSibling;
        btn.style.display = el.value.length > 0 ? 'block' : 'none';
    }

    // リアルタイムプレビュー
    [jaInput, enInput].forEach(el => {
        el.addEventListener('input', () => {
            toggleClr(el);
            draw();
        });
    });

    // モーダル制御（聖域ロジック）
    function openModal() { document.getElementById('privacyModal').style.display = 'flex'; }
    function closeModal() { document.getElementById('privacyModal').style.display = 'none'; }

    // 初期描画
    window.onload = draw;
</script>

</body>
</html>
