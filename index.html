<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stamp Generator</title>
    <link rel="apple-touch-icon" href="image_121.png">
    <link rel="icon" href="image_121.png">
    <style>
        :root {
            --main: #333;
            --bg: #fff;
            --accent: #eee;
            --input-bg: #fafafa;
            --radius: 15px;
            /* ヴィンテージカラー */
            --plate-bg: #e0dacc; /* 黄ばんだ金属 */
            --rust: #8b4513;     /* 茶サビ */
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
        }

        input { -webkit-user-select: text; user-select: text; }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--main);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header { padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        h1 { font-size: 1.2rem; margin: 0; font-weight: 900; }
        h1 span { font-weight: normal; color: #999; margin-right: 5px; }

        .hub-btn {
            text-decoration: none; color: var(--main); background: var(--accent);
            padding: 8px 15px; border-radius: var(--radius); font-size: 0.9rem; font-weight: bold;
        }

        main { flex: 1; padding: 0 20px; max-width: 500px; margin: 0 auto; width: 100%; }

        .preview-container {
            background: #dcdcdc; /* 透過が見やすい少し濃いグレー */
            width: 100%; aspect-ratio: 370 / 320;
            border-radius: var(--radius); display: flex; justify-content: center; align-items: center;
            margin-bottom: 20px;
        }

        #previewCanvas { max-width: 95%; max-height: 95%; }

        .input-group { position: relative; margin-bottom: 15px; }
        input {
            width: 100%; padding: 15px; border: 2px solid var(--accent);
            border-radius: var(--radius); background: var(--input-bg);
            font-size: 1rem; color: var(--main); outline: none;
            -webkit-appearance: none; opacity: 1 !important; -webkit-text-fill-color: var(--main);
        }

        .clr {
            position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
            background: var(--accent); border: none; width: 25px; height: 25px;
            border-radius: 50%; color: var(--main); display: none;
        }

        .gen-btn {
            width: 100%; padding: 18px; background: var(--main); color: var(--bg);
            border: none; border-radius: var(--radius); font-size: 1rem; font-weight: bold;
            cursor: pointer; margin-top: 10px;
        }

        footer { padding: 30px 20px; text-align: center; font-size: 0.8rem; }
        .footer-links { margin-bottom: 15px; display: flex; justify-content: center; gap: 15px; }
        .footer-links a { color: var(--main); text-decoration: none; font-weight: bold; }
        .copyright { color: #999; }

        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center;
            flex-direction: column;
        }
        .modal-content { 
            background: var(--bg); padding: 20px; border-radius: var(--radius); 
            max-width: 90%; text-align: center;
        }
        
        #resultImg { width: 100%; max-width: 370px; border-radius: 5px; margin-bottom: 20px; -webkit-touch-callout: default; }
        .hint { color: #fff; margin-top: 15px; font-size: 0.9rem; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <h1><span>#121</span>Stamp Gen</h1>
    <a href="https://afrorakda.github.io/" class="hub-btn">🏠Hub</a>
</header>

<main>
    <div class="preview-container">
        <canvas id="previewCanvas" width="370" height="320"></canvas>
    </div>

    <div class="input-group">
        <input type="text" id="jaInput" placeholder="承知いたしました" maxlength="20">
        <button class="clr" id="clrJa" onclick="clearInput('jaInput')">×</button>
    </div>

    <div class="input-group">
        <input type="text" id="enInput" placeholder="INDUSTRIAL PLATE" maxlength="40">
        <button class="clr" id="clrEn" onclick="clearInput('enInput')">×</button>
    </div>

    <button class="gen-btn" onclick="showResult()">Create Stamp</button>
</main>

<footer>
    <div class="footer-links">
        <a href="https://ko-fi.com/afrorakda" target="_blank">☕️buy me a coffee</a>
        <a href="javascript:void(0)" onclick="openModal('privacyModal')">Privacy Policy</a>
    </div>
    <div class="copyright">Local processing.</div>
</footer>

<div id="resultModal" class="modal" onclick="closeModal('resultModal')">
    <div class="modal-content" onclick="event.stopPropagation()">
        <img id="resultImg" src="" alt="Stamp Result">
        <button class="gen-btn" onclick="closeModal('resultModal')">Close</button>
    </div>
    <div class="hint">画像を長押しして「写真に追加」</div>
</div>

<div id="privacyModal" class="modal" onclick="closeModal('privacyModal')">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3>Privacy Policy</h3>
        <p>Local processing.</p>
        <button class="gen-btn" onclick="closeModal('privacyModal')">Close</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('previewCanvas');
    const ctx = canvas.getContext('2d');
    const jaInput = document.getElementById('jaInput');
    const enInput = document.getElementById('enInput');

    // Canvasの描画ロジック（リアルなサビ、力強いフォント）
    function draw() {
        const jaText = jaInput.value || jaInput.placeholder;
        const enText = (enInput.value || enInput.placeholder).toUpperCase();
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // デザインサイズ
        const rectW = 340;
        const rectH = 190;
        const x = (canvas.width - rectW) / 2;
        const y = (canvas.height - rectH) / 2;
        const radius = 25; // 角丸

        // 1. シャドウ（プレートの立体感）
        ctx.fillStyle = 'rgba(0,0,0,0.1)';
        ctx.beginPath(); ctx.roundRect(x + 3, y + 3, rectW, rectH, radius); ctx.fill();

        // 2. メインプレート（黄ばんだ金属色）
        ctx.fillStyle = '#e0dacc'; 
        ctx.beginPath(); ctx.roundRect(x, y, rectW, rectH, radius); ctx.fill();

        // 3. サビ表現（脱・水玉、こびりついた茶錆）
        // プレート全体の汚れムラ（薄くボカす）
        ctx.fillStyle = 'rgba(139, 69, 19, 0.02)';
        ctx.beginPath(); ctx.roundRect(x, y, rectW, rectH, radius); ctx.fill();

        // 枠（フチ）のサビと盛り上がり（image_10.png参考、太く強調）
        ctx.strokeStyle = '#8b4513'; // 茶サビ
        ctx.lineWidth = 10;          // 太く強調
        ctx.lineJoin = 'round';
        ctx.save();
        // 縁に不規則なサビドットを散布（はみ出さない）
        ctx.clip(); // プレート内にクリップ
        for (let i = 0; i < rectW * 4 + rectH * 4; i += 2) {
            const angle = Math.random() * Math.PI * 2;
            const px = x + rectW/2 + Math.cos(angle) * (rectW/2 + Math.random()*2 - 4);
            const py = y + rectH/2 + Math.sin(angle) * (rectH/2 + Math.random()*2 - 4);
            if (px > x && px < x+rectW && py > y && py < y+rectH) {
                ctx.fillStyle = `rgba(139, 69, 19, ${Math.random()*0.8})`;
                ctx.fillRect(px, py, 2, 2);
            }
        }
        ctx.restore();
        
        // 盛り上がった縁のメイン線
        ctx.lineWidth = 4;
        ctx.strokeStyle = 'rgba(139, 69, 19, 0.7)';
        ctx.beginPath(); ctx.roundRect(x+2, y+2, rectW-4, rectH-4, radius-2); ctx.stroke();

        // 四隅のネジ穴
        const offset = 22;
        ctx.fillStyle = '#8b4513';
        [[x+offset, y+offset], [x+rectW-offset, y+offset], [x+offset, y+rectH-offset], [x+rectW-offset, y+rectH-offset]].forEach(p => {
            // ネジ穴周囲のサビグラデーション
            const grad = ctx.createRadialGradient(p[0], p[1], 0, p[0], p[1], 10);
            grad.addColorStop(0, 'rgba(139, 69, 19, 1)');
            grad.addColorStop(1, 'rgba(139, 69, 19, 0)');
            ctx.fillStyle = grad;
            ctx.beginPath(); ctx.arc(p[0], p[1], 10, 0, Math.PI*2); ctx.fill();

            // ネジ穴
            ctx.fillStyle = '#333333';
            ctx.beginPath(); ctx.arc(p[0], p[1], 4, 0, Math.PI*2); ctx.fill();
        });

        ctx.textAlign = 'center';
        
        // 4. 日本語（整っているが力強い角ゴシック、刻印風）
        ctx.fillStyle = '#333333';
        let jaSize = 48;
        // image_10.pngの「横浜」のような力強いフォントを指定（ sans-serif で太さを強調 ）
        ctx.font = `900 ${jaSize}px sans-serif`;
        // 幅に合わせてフォントサイズを縮小
        while (ctx.measureText(jaText).width > rectW - 60 && jaSize > 20) {
            jaSize -= 2; ctx.font = `900 ${jaSize}px sans-serif`;
        }
        // 少し刻印感を出すために、文字をわずかに下にずらす
        ctx.fillText(jaText, canvas.width / 2, y + (rectH / 2) + (enText ? -8 : 15));

        // 5. 英語（ステッカー風）
        if (enText) {
            let enSize = 14;
            ctx.font = `bold ${enSize}px sans-serif`;
            ctx.letterSpacing = "6px";
            ctx.fillText(enText, canvas.width / 2, y + (rectH / 2) + 45);
        }
    }

    function showResult() {
        document.getElementById('resultImg').src = canvas.toDataURL('image/png');
        document.getElementById('resultModal').style.display = 'flex';
    }

    function clearInput(id) {
        const el = document.getElementById(id);
        el.value = '';
        el.nextElementSibling.style.display = 'none';
        draw();
    }

    [jaInput, enInput].forEach(el => {
        el.addEventListener('input', () => {
            el.nextElementSibling.style.display = el.value.length > 0 ? 'block' : 'none';
            draw();
        });
    });

    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    window.onload = draw;
</script>

</body>
</html>
