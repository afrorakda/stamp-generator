<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stamp Generator</title>
    <style>
        :root { --main: #333; --bg: #fff; --accent: #eee; --radius: 15px; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: -apple-system, sans-serif; background-color: var(--bg); color: var(--main); display: flex; flex-direction: column; min-height: 100vh; }
        header { padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        h1 { font-size: 1.2rem; margin: 0; font-weight: 900; }
        main { flex: 1; padding: 0 20px; max-width: 500px; margin: 0 auto; width: 100%; }
        .preview-container { background: #bbb; width: 100%; aspect-ratio: 370 / 320; border-radius: var(--radius); display: flex; justify-content: center; align-items: center; margin-bottom: 20px; }
        #previewCanvas { max-width: 95%; max-height: 95%; }
        input { width: 100%; padding: 15px; border: 2px solid var(--accent); border-radius: var(--radius); background: #fafafa; font-size: 1rem; color: var(--main); margin-bottom: 15px; outline: none; -webkit-appearance: none; }
        .gen-btn { width: 100%; padding: 18px; background: var(--main); color: var(--bg); border: none; border-radius: var(--radius); font-size: 1rem; font-weight: bold; cursor: pointer; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; flex-direction: column; }
        .modal-content { background: var(--bg); padding: 20px; border-radius: var(--radius); max-width: 90%; text-align: center; }
        #resultImg { width: 100%; max-width: 370px; border-radius: 5px; -webkit-touch-callout: default; }
        footer { padding: 30px 20px; text-align: center; font-size: 0.8rem; color: #999; }
    </style>
</head>
<body>

<header><h1>#121 Stamp Gen</h1></header>

<main>
    <div class="preview-container"><canvas id="previewCanvas" width="370" height="320"></canvas></div>
    <input type="text" id="jaInput" placeholder="文字を入力" maxlength="15">
    <button class="gen-btn" onclick="showResult()">Create Stamp</button>
</main>

<footer>No login / No tracking / afrorakda © 2026</footer>

<div id="resultModal" class="modal" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <img id="resultImg" src="" alt="Result">
        <button class="gen-btn" onclick="closeModal()">Close</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('previewCanvas');
    const ctx = canvas.getContext('2d');
    const jaInput = document.getElementById('jaInput');

    // あなたが用意した「最高の錆び画像」を読み込むための設定
    const plateImg = new Image();
    plateImg.src = 'IMG_7702.png'; // 同じフォルダに画像を置けば読み込まれます

    function draw() {
        const text = jaInput.value || "文字を入力";
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 1. 画像の描画（読み込めない場合は薄いグレー）
        if (plateImg.complete && plateImg.naturalWidth !== 0) {
            ctx.drawImage(plateImg, 15, 65, 340, 190);
        } else {
            ctx.fillStyle = '#eee';
            ctx.beginPath(); ctx.roundRect(15, 65, 340, 190, 15); ctx.fill();
        }

        // 2. 文字の描画（乗算合成で馴染ませる）
        ctx.save();
        ctx.globalCompositeOperation = 'multiply';
        ctx.textAlign = 'center';
        ctx.fillStyle = 'rgba(51, 51, 51, 0.85)';
        ctx.font = '900 48px sans-serif';
        
        // プレスの厚み出し（ハイライト）
        ctx.shadowColor = 'rgba(255,255,255,0.4)';
        ctx.shadowOffsetX = -1; ctx.shadowOffsetY = -1;
        
        ctx.fillText(text, 185, 175);
        ctx.restore();
    }

    function showResult() {
        document.getElementById('resultImg').src = canvas.toDataURL('image/png');
        document.getElementById('resultModal').style.display = 'flex';
    }
    function closeModal() { document.getElementById('resultModal').style.display = 'none'; }
    
    plateImg.onload = draw;
    jaInput.addEventListener('input', draw);
    window.onload = draw;
</script>
</body>
</html>
