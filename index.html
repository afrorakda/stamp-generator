<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stamp Generator</title>
    <link rel="apple-touch-icon" href="image_121.png">
    <link rel="icon" href="image_121.png">
    <style>
        :root {
            --main: #333;
            --bg: #fff;
            --accent: #eee;
            --input-bg: #fafafa;
            --radius: 15px;
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
            /* 基本的に全要素でテキスト選択を抑制 */
            -webkit-user-select: none;
            user-select: none;
        }

        /* 入力欄だけは文字を打てるように許可 */
        input { -webkit-user-select: text; user-select: text; }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--main);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header { padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        h1 { font-size: 1.2rem; margin: 0; font-weight: 900; }
        h1 span { font-weight: normal; color: #999; margin-right: 5px; }

        .hub-btn {
            text-decoration: none; color: var(--main); background: var(--accent);
            padding: 8px 15px; border-radius: var(--radius); font-size: 0.9rem; font-weight: bold;
        }

        main { flex: 1; padding: 0 20px; max-width: 500px; margin: 0 auto; width: 100%; }

        .preview-container {
            background: #e0e0e0; width: 100%; aspect-ratio: 370 / 320;
            border-radius: var(--radius); display: flex; justify-content: center; align-items: center;
            margin-bottom: 20px;
        }

        #previewCanvas { max-width: 90%; max-height: 90%; }

        .input-group { position: relative; margin-bottom: 15px; }
        input {
            width: 100%; padding: 15px; border: 2px solid var(--accent);
            border-radius: var(--radius); background: var(--input-bg);
            font-size: 1rem; color: var(--main); outline: none;
            -webkit-appearance: none; opacity: 1 !important; -webkit-text-fill-color: var(--main);
        }

        .clr {
            position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
            background: var(--accent); border: none; width: 25px; height: 25px;
            border-radius: 50%; color: var(--main); display: none;
        }

        .gen-btn {
            width: 100%; padding: 18px; background: var(--main); color: var(--bg);
            border: none; border-radius: var(--radius); font-size: 1rem; font-weight: bold;
            cursor: pointer; margin-top: 10px;
        }

        footer { padding: 30px 20px; text-align: center; font-size: 0.8rem; }
        .footer-links { margin-bottom: 15px; display: flex; justify-content: center; gap: 15px; }
        .footer-links a { color: var(--main); text-decoration: none; font-weight: bold; }
        .copyright { color: #999; }

        /* Modal & Result Image */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center;
            flex-direction: column;
        }
        .modal-content { 
            background: var(--bg); padding: 20px; border-radius: var(--radius); 
            max-width: 90%; text-align: center;
        }
        
        #resultImg { 
            width: 100%; max-width: 370px; border-radius: 5px; margin-bottom: 20px;
            /* 画像の長押し保存を邪魔しない設定 */
            -webkit-touch-callout: default; 
            pointer-events: auto;
        }

        .hint { color: #fff; margin-top: 15px; font-size: 0.9rem; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <h1><span>#121</span>Stamp Gen</h1>
    <a href="https://afrorakda.github.io/" class="hub-btn">🏠Hub</a>
</header>

<main>
    <div class="preview-container">
        <canvas id="previewCanvas" width="370" height="320"></canvas>
    </div>

    <div class="input-group">
        <input type="text" id="jaInput" placeholder="承知いたしました" maxlength="20">
        <button class="clr" id="clrJa" onclick="clearInput('jaInput')">×</button>
    </div>

    <div class="input-group">
        <input type="text" id="enInput" placeholder="OFFICIAL NOTED" maxlength="40">
        <button class="clr" id="clrEn" onclick="clearInput('enInput')">×</button>
    </div>

    <button class="gen-btn" onclick="showResult()">Create Stamp</button>
</main>

<footer>
    <div class="footer-links">
        <a href="https://ko-fi.com/afrorakda" target="_blank">☕️buy me a coffee</a>
        <a href="javascript:void(0)" onclick="openModal('privacyModal')">Privacy Policy</a>
    </div>
    <div class="copyright">No login / No tracking / No ads / Browser only<br>afrorakda © 2026</div>
</footer>

<div id="resultModal" class="modal" onclick="closeModal('resultModal')">
    <div class="modal-content" onclick="event.stopPropagation()">
        <img id="resultImg" src="" alt="Stamp Result">
        <button class="gen-btn" onclick="closeModal('resultModal')">Close</button>
    </div>
    <div class="hint">画像を長押しして保存してください</div>
</div>

<div id="privacyModal" class="modal" onclick="closeModal('privacyModal')">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3>Privacy Policy</h3>
        <p>No login. No tracking. No ads. Browser only.<br>Local processing.</p>
        <button class="gen-btn" onclick="closeModal('privacyModal')">Close</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('previewCanvas');
    const ctx = canvas.getContext('2d');
    const jaInput = document.getElementById('jaInput');
    const enInput = document.getElementById('enInput');

    function draw() {
        const jaText = jaInput.value || jaInput.placeholder;
        const enText = (enInput.value || enInput.placeholder).toUpperCase();
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const rectW = 340;
        const rectH = 220;
        const x = (canvas.width - rectW) / 2;
        const y = (canvas.height - rectH) / 2;
        const radius = 15;

        ctx.strokeStyle = '#333333';
        ctx.lineWidth = 6;
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.roundRect(x, y, rectW, rectH, radius);
        ctx.fill();
        ctx.stroke();

        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.roundRect(x + 10, y + 10, rectW - 20, rectH - 20, radius - 5);
        ctx.stroke();

        const offset = 18;
        ctx.fillStyle = '#333333';
        [[x+offset, y+offset], [x+rectW-offset, y+offset], [x+offset, y+rectH-offset], [x+rectW-offset, y+rectH-offset]].forEach(p => {
            ctx.beginPath(); ctx.arc(p[0], p[1], 3, 0, Math.PI*2); ctx.fill();
        });

        ctx.textAlign = 'center';
        let jaSize = 48;
        ctx.font = `600 ${jaSize}px serif`;
        while (ctx.measureText(jaText).width > rectW - 60 && jaSize > 20) {
            jaSize -= 2; ctx.font = `600 ${jaSize}px serif`;
        }
        ctx.fillText(jaText, canvas.width / 2, y + (rectH / 2) + (enText ? -8 : 15));

        if (enText) {
            let enSize = 16;
            ctx.font = `900 ${enSize}px sans-serif`;
            ctx.letterSpacing = "4px";
            while (ctx.measureText(enText).width > rectW - 80 && enSize > 10) {
                enSize -= 1; ctx.font = `900 ${enSize}px sans-serif`;
            }
            ctx.fillText(enText, canvas.width / 2, y + (rectH / 2) + 40);
        }
    }

    function showResult() {
        const resultImg = document.getElementById('resultImg');
        resultImg.src = canvas.toDataURL('image/png');
        document.getElementById('resultModal').style.display = 'flex';
    }

    function clearInput(id) {
        const el = document.getElementById(id);
        el.value = '';
        el.nextElementSibling.style.display = 'none';
        draw();
    }

    [jaInput, enInput].forEach(el => {
        el.addEventListener('input', () => {
            el.nextElementSibling.style.display = el.value.length > 0 ? 'block' : 'none';
            draw();
        });
    });

    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    window.onload = draw;
</script>

</body>
</html>
